name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Unzip uploaded project
        run: |
          ZIP_FILE="$(find . -maxdepth 3 -name '*.zip' | head -n 1)"

          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: No ZIP file found."
            exit 1
          fi

          echo "Using ZIP: $ZIP_FILE"
          mkdir extracted
          unzip -q "$ZIP_FILE" -d extracted

          SETTINGS_FILE="$(find extracted -name settings.gradle -o -name settings.gradle.kts | head -n 1)"

          if [ -z "$SETTINGS_FILE" ]; then
            echo "ERROR: No settings.gradle found inside ZIP."
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Project dir: $PROJECT_DIR"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android platform
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-35" "build-tools;35.0.0"

      - name: Install Gradle
        run: |
          curl -L -o gradle.zip https://services.gradle.org/distributions/gradle-8.10.2-bin.zip
          unzip -q gradle.zip -d "$HOME/gradle"
          echo "$HOME/gradle/gradle-8.10.2/bin" >> "$GITHUB_PATH"

      - name: Build APK
        run: |
          cd "$PROJECT_DIR"
          gradle --no-daemon assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: aether-os-launcher-debug-apk
          path: "**/app/build/outputs/apk/debug/*.apk"

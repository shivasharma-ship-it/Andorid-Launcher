name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Locate Android project
        run: |
          echo "Repository files:"
          find "$GITHUB_WORKSPACE" -maxdepth 4 -type f | sort

          SETTINGS_FILE="$(find "$GITHUB_WORKSPACE" \( -name settings.gradle -o -name settings.gradle.kts \) | head -n 1)"

          if [ -z "$SETTINGS_FILE" ]; then
            echo "ERROR: Could not find settings.gradle or settings.gradle.kts"
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"
          echo "Found Android project at: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install Gradle
        run: |
          curl -L -o gradle.zip https://services.gradle.org/distributions/gradle-8.10.2-bin.zip
          unzip -q gradle.zip -d "$HOME/gradle"
          echo "$HOME/gradle/gradle-8.10.2/bin" >> "$GITHUB_PATH"

      - name: Build APK
        run: |
          cd "$PROJECT_DIR"
          gradle --version
          gradle --no-daemon assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aether-os-launcher-debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/app-debug.apk
